<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawid — Wealth Group</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A6CFF;--cyan:#00D4FF;--bg:#F0F4FB;--text:#0D1020;--muted:#8892AA;--border:rgba(26,108,255,0.13);}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(26,108,255,0.09) 0%,transparent 65%),
  radial-gradient(ellipse 50% 50% at 75% 75%,rgba(0,212,255,0.05) 0%,transparent 55%),
  linear-gradient(170deg,#EBF0FB 0%,#F3F6FD 55%,#E8EEF9 100%);}
.bg::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(26,108,255,0.028) 1px,transparent 1px),linear-gradient(90deg,rgba(26,108,255,0.028) 1px,transparent 1px);background-size:54px 54px;}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(26,108,255,0.09) 0%,transparent 65%),
  linear-gradient(170deg,#EBF0FB 0%,#F3F6FD 55%,#E8EEF9 100%);}
.login-screen.hidden{display:none;}
.login-box{display:flex;flex-direction:column;align-items:center;gap:18px;width:min(320px,88vw);}
.login-box img{height:42px;opacity:0.8;margin-bottom:6px;}
.login-box h2{font-family:"DM Serif Display",serif;font-size:22px;color:var(--text);}
.login-box p{font-size:13px;color:var(--muted);font-weight:300;margin-top:-8px;}
.login-input{width:100%;background:rgba(255,255,255,0.8);border:1.5px solid var(--border);border-radius:13px;padding:13px 16px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:300;color:var(--text);outline:none;transition:border-color .2s;text-align:center;letter-spacing:3px;}
.login-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,108,255,0.09);}
.login-input::placeholder{letter-spacing:0;color:var(--muted);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),#1248C8);color:#fff;border:none;border-radius:13px;padding:13px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(26,108,255,0.35);transition:all .2s;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,108,255,0.45);}
.login-error{font-size:12px;color:#E03030;min-height:16px;transition:opacity .2s;}
.login-error.hidden{opacity:0;}

/* HEADER */
.header{position:absolute;top:0;left:0;right:0;height:60px;z-index:10;display:flex;align-items:center;padding:0 28px;background:rgba(240,244,251,0.85);backdrop-filter:blur(14px);opacity:0;animation:fadeDown .7s .1s forwards;}
.header img{height:32px;opacity:0.78;}

/* APP */
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:68px 20px 16px;gap:2px;}

/* DAWID */
.dawid-wrap{position:relative;flex-shrink:0;opacity:0;animation:fadeUp .9s .2s forwards;width:200px;height:218px;}
.dawid-img{width:200px;height:218px;object-fit:cover;object-position:center top;border-radius:50% 50% 45% 45%;filter:drop-shadow(0 12px 30px rgba(26,108,255,0.22)) drop-shadow(0 4px 12px rgba(0,0,0,0.15));animation:floatY 5s ease-in-out infinite;}
.dawid-ring{position:absolute;inset:-16px;border-radius:50%;border:1.5px solid rgba(26,108,255,0.18);animation:ringExpand 3s ease-in-out infinite;}
.dawid-ring2{position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(0,212,255,0.13);animation:ringExpand 3s ease-in-out infinite 1s;}
.dawid-scan{position:absolute;inset:0;border-radius:50% 50% 45% 45%;overflow:hidden;pointer-events:none;}
.dawid-scan::after{content:"";position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.5),transparent);animation:scanLine 3.5s ease-in-out infinite 2s;}
.hud-tl,.hud-tr,.hud-bl,.hud-br{position:absolute;width:16px;height:16px;border-color:rgba(26,108,255,0.4);border-style:solid;}
.hud-tl{top:8px;left:16px;border-width:2px 0 0 2px;border-radius:3px 0 0 0;}
.hud-tr{top:8px;right:16px;border-width:2px 2px 0 0;border-radius:0 3px 0 0;}
.hud-bl{bottom:20px;left:16px;border-width:0 0 2px 2px;border-radius:0 0 0 3px;}
.hud-br{bottom:20px;right:16px;border-width:0 2px 2px 0;border-radius:0 0 3px 0;}
.online-badge{position:absolute;bottom:28px;right:-4px;background:rgba(240,244,251,0.92);border:1px solid rgba(26,108,255,0.2);border-radius:20px;padding:4px 11px 4px 8px;display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);font-weight:500;animation:tagBob 3.5s ease-in-out infinite;}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:dotPulse 2s ease-in-out infinite;}
.dawid-glow{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:140px;height:20px;border-radius:50%;background:radial-gradient(ellipse,rgba(26,108,255,0.2) 0%,transparent 70%);filter:blur(5px);animation:glowPulse 3s ease-in-out infinite;}

/* GREETING */
.greeting{text-align:center;margin-top:6px;margin-bottom:10px;opacity:0;animation:fadeUp .7s .5s forwards;}
.greeting h1{font-family:"DM Serif Display",serif;font-size:clamp(18px,2.4vw,24px);margin-bottom:3px;}
.greeting p{font-size:12px;color:var(--muted);font-weight:300;}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;opacity:0;animation:fadeUp .7s .6s forwards;}
.chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);border:1px solid rgba(26,108,255,0.16);border-radius:12px;padding:8px 14px;cursor:pointer;background:rgba(240,244,251,0.8);font-family:"DM Sans",sans-serif;transition:all .2s;}
.chip:hover{background:rgba(255,255,255,0.95);border-color:var(--blue);box-shadow:0 4px 14px rgba(26,108,255,0.12);transform:translateY(-1px);}
.chip.active{background:rgba(26,108,255,0.1);border-color:var(--blue);color:var(--blue);}

/* CARD */
.card{width:100%;max-width:500px;background:rgba(240,244,251,0.85);border:1px solid var(--border);border-radius:22px;box-shadow:0 6px 30px rgba(26,108,255,0.09);overflow:hidden;backdrop-filter:blur(14px);opacity:0;animation:fadeUp .7s .7s forwards;}
.msgs{padding:14px 16px 10px;display:flex;flex-direction:column;gap:9px;max-height:150px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.msgs::-webkit-scrollbar{width:2px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;gap:8px;align-items:flex-end;opacity:0;animation:msgIn .3s forwards;}
.msg.user{flex-direction:row-reverse;}
.mav{width:24px;height:24px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.msg.assistant .mav{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;}
.msg.user .mav{background:rgba(26,108,255,0.1);border:1px solid var(--border);color:var(--muted);}
.mbubble{max-width:84%;padding:9px 13px;font-size:13px;line-height:1.68;font-weight:300;border-radius:14px;}
.msg.assistant .mbubble{background:rgba(255,255,255,0.7);border:1px solid rgba(26,108,255,0.1);border-bottom-left-radius:3px;color:var(--text);}
.msg.user .mbubble{background:linear-gradient(135deg,var(--blue),#1248C8);border-bottom-right-radius:3px;color:#fff;box-shadow:0 3px 12px rgba(26,108,255,0.25);}
.tb{display:flex;gap:4px;align-items:center;padding:2px 0;}
.tb span{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:dotBounce 1.2s infinite;}
.tb span:nth-child(2){animation-delay:.2s;}.tb span:nth-child(3){animation-delay:.4s;}
.divider{height:1px;background:var(--border);margin:0 16px;}
.input-row{display:flex;align-items:flex-end;gap:8px;padding:10px 12px 12px;}
.chat-input{flex:1;background:rgba(255,255,255,0.6);border:1.5px solid var(--border);border-radius:13px;padding:10px 14px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:300;outline:none;resize:none;min-height:42px;max-height:100px;transition:border-color .2s;line-height:1.5;}
.chat-input:focus{border-color:var(--blue);background:rgba(255,255,255,0.9);box-shadow:0 0 0 3px rgba(26,108,255,0.09);}
.chat-input::placeholder{color:var(--muted);}
.mic-btn{width:42px;height:42px;flex-shrink:0;border-radius:12px;border:1px solid rgba(26,108,255,0.22);background:transparent;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.mic-btn:hover{background:rgba(26,108,255,0.08);}
.mic-btn.recording{background:rgba(255,50,50,0.1);border-color:rgba(255,50,50,0.4);color:#E03030;animation:micPulse 1s ease-in-out infinite;}
.send-btn{width:42px;height:42px;flex-shrink:0;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue),#1248C8);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,108,255,0.35);transition:all .18s;}
.send-btn:hover{transform:scale(1.07);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* MODE LABEL */
.mode-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--blue);opacity:0.7;padding:6px 16px 0;font-weight:500;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
@keyframes glowPulse{0%,100%{opacity:1;transform:translateX(-50%) scaleX(1)}50%{opacity:.4;transform:translateX(-50%) scaleX(.6)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes ringExpand{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:.2;transform:scale(1.05)}}
@keyframes scanLine{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
@keyframes tagBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px rgba(0,212,255,.8)}50%{box-shadow:0 0 14px rgba(0,212,255,1)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(224,48,48,0.35)}50%{box-shadow:0 0 0 7px rgba(224,48,48,0)}}
</style>
</head>

      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="white"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let history = [];
let sessionPwd = "";
let currentMode = "main";
let recognition = null;
let isRecording = false;

const modeNames = {
  main:     null,
  zmluva:   "📄 Režim: Zmluvy",
  financie: "💰 Režim: Financie",
  mail:     "✉️ Režim: Mail pre klienta",
  trening:  "🎓 Režim: Tréning",
  interni:  "🏢 Režim: Interné info",
};

async function login() {
  const pwd = document.getElementById("pwdInput").value.trim();
  if (!pwd) return;
  const err = document.getElementById("loginError");
  try {
    const r = await fetch("/api/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({password: pwd})
    });
    const d = await r.json();
    if (d.ok) {
      sessionPwd = pwd;
      document.getElementById("loginScreen").classList.add("hidden");
    } else {
      err.classList.remove("hidden");
      setTimeout(() => err.classList.add("hidden"), 2500);
    }
  } catch {
    err.textContent = "Chyba servera";
    err.classList.remove("hidden");
  }
}

function setMode(mode, btn) {
  currentMode = mode;
  history = [];
  document.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const label = document.getElementById("modeLabel");
  if (modeNames[mode]) {
    label.textContent = modeNames[mode];
    label.style.display = "block";
  } else {
    label.style.display = "none";
  }
  // Clear messages and send opening line
  const msgs = document.getElementById("msgs");
  msgs.innerHTML = "";
  const openers = {
    zmluva:   "Pripravíme zmluvu! Napíš mi čo potrebuješ — napr. *sprostredkovateľskú zmluvu k predaju bytu* a doplním čo bude chýbať. 📄",
    financie: "Som tu pre finančné otázky. Čo potrebuješ? 💰",
    mail:     "Napíšem mail pre tvojho klienta. Povedz mi komu, čo a aký tón. ✉️",
    trening:  "Výborne, trénujeme! Vyber čo ťa zaujíma:
📞 Studené kontakty
🛡️ Námietky
🎯 Prezentácia produktu
🤝 Uzatváranie obchodu",
    interni:  "Interné info — spýtaj sa na čokoľvek: fotograf, podpis, Tabidoo a pod. 🏢",
  };
  addMsg("assistant", openers[mode]);
}

function addMsg(role, text) {
  const c = document.getElementById("msgs");
  const d = document.createElement("div");
  d.className = "msg " + role;
  const av = role === "assistant" ? "D" : "·";
  d.innerHTML = `<div class="mav">${av}</div><div class="mbubble">${text.replace(/
/g,"<br>")}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function showTyping() {
  const c = document.getElementById("msgs");
  const d = document.createElement("div");
  d.id = "typing"; d.className = "msg assistant";
  d.innerHTML = '<div class="mav">D</div><div class="mbubble"><div class="tb"><span></span><span></span><span></span></div></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }
function resize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 100) + "px"; }
function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }

function toggleMic() {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) { alert("Skúste Chrome."); return; }
  if (isRecording) { if (recognition) recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR(); recognition.lang = "sk-SK"; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = e => { document.getElementById("inp").value = e.results[0][0].transcript; stopMic(); send(); };
  recognition.onerror = stopMic; recognition.onend = stopMic;
  recognition.start(); isRecording = true; document.getElementById("micBtn").classList.add("recording");
}
function stopMic() { if (recognition) recognition.stop(); isRecording = false; document.getElementById("micBtn").classList.remove("recording"); }

async function send() {
  const inp = document.getElementById("inp");
  const text = inp.value.trim();
  if (!text || !sessionPwd) return;
  inp.value = ""; inp.style.height = "auto";
  addMsg("user", text);
  history.push({role: "user", content: text});
  document.getElementById("sendBtn").disabled = true;
  showTyping();
  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({password: sessionPwd, mode: currentMode, messages: history})
    });
    const data = await r.json();
    removeTyping();
    if (data.error) { addMsg("assistant", "⚠️ " + data.error); history.pop(); }
    else { const rep = data.content[0].text; history.push({role:"assistant",content:rep}); addMsg("assistant", rep); }
  } catch(e) { removeTyping(); addMsg("assistant", "⚠️ Chyba pripojenia."); history.pop(); }
  document.getElementById("sendBtn").disabled = false;
}
</script>
</body>
</html>
